<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniHub v10.0 - Scientific</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root {
            --primary: #6366f1; --bg: #0a0f1d; --card-bg: #161e31;
            --text: #f1f5f9; --accent: #22d3ee; --active: #4f46e5;
            --math-btn: #2d3748; --math-op: #4f46e5;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* ナビゲーション */
        nav { display: flex; overflow-x: auto; background: var(--card-bg); border-bottom: 1px solid #2d3748; padding: 5px; scrollbar-width: none; }
        nav::-webkit-scrollbar { display: none; }
        nav button { padding: 12px 20px; border: none; background: transparent; color: #94a3b8; font-weight: bold; cursor: pointer; white-space: nowrap; border-radius: 8px; transition: 0.3s; }
        nav button.active { background: var(--active); color: white; }

        /* メイン */
        main { flex: 1; overflow-y: auto; padding: 15px; }
        .tab-content { display: none; max-width: 900px; margin: 0 auto; }
        .tab-content.active { display: block; }

        /* --- 関数電卓 UI (Desmos Style) --- */
        .calculator { background: var(--card-bg); border-radius: 16px; border: 1px solid #2d3748; overflow: hidden; max-width: 500px; margin: 0 auto; }
        .calc-display { background: #000; padding: 20px; text-align: right; border-bottom: 1px solid #2d3748; }
        #calc-expr { font-size: 1.2rem; color: var(--accent); min-height: 1.5rem; word-break: break-all; }
        #calc-res { font-size: 2rem; font-weight: bold; color: #fff; margin-top: 10px; }
        
        .calc-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; background: #2d3748; }
        .calc-grid button { 
            padding: 15px 5px; border: none; background: var(--card-bg); color: #fff; 
            font-size: 1rem; cursor: pointer; transition: 0.1s;
        }
        .calc-grid button:hover { background: #1e293b; }
        .calc-grid button:active { background: var(--active); }
        .btn-op { background: #1e293b !important; color: var(--accent) !important; }
        .btn-eq { background: var(--active) !important; grid-column: span 2; }
        .btn-clear { color: #f43f5e !important; }

        /* 他のUI */
        .card { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid #2d3748; margin-bottom: 15px; }
        textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; }
        .action-btn { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <nav>
        <button onclick="showTab('tools')" class="active">📐 関数電卓</button>
        <button onclick="showTab('media')">🎬 メディア</button>
        <button onclick="showTab('ai')">🧠 AI翻訳</button>
        <button onclick="showTab('games')">🎮 ゲーム</button>
        <button onclick="showTab('chat')">💬 チャット</button>
    </nav>

    <main>
        <!-- 1. 関数電卓セクション (Desmos風) -->
        <div id="tools" class="tab-content active">
            <div class="calculator">
                <div class="calc-display">
                    <div id="calc-expr"></div>
                    <div id="calc-res">0</div>
                </div>
                <div class="calc-grid">
                    <!-- 1行目 -->
                    <button onclick="add('sin(')" class="btn-op">sin</button>
                    <button onclick="add('cos(')" class="btn-op">cos</button>
                    <button onclick="add('tan(')" class="btn-op">tan</button>
                    <button onclick="add('pi')" class="btn-op">π</button>
                    <button onclick="clearCalc()" class="btn-clear">AC</button>
                    <!-- 2行目 -->
                    <button onclick="add('sqrt(')" class="btn-op">√</button>
                    <button onclick="add('^')" class="btn-op">^</button>
                    <button onclick="add('log(')" class="btn-op">log</button>
                    <button onclick="add('(')" class="btn-op">(</button>
                    <button onclick="add(')')" class="btn-op">)</button>
                    <!-- 3行目 -->
                    <button onclick="add('7')">7</button>
                    <button onclick="add('8')">8</button>
                    <button onclick="add('9')">9</button>
                    <button onclick="add('/')" class="btn-op">÷</button>
                    <button onclick="backspace()">⌫</button>
                    <!-- 4行目 -->
                    <button onclick="add('4')">4</button>
                    <button onclick="add('5')">5</button>
                    <button onclick="add('6')">6</button>
                    <button onclick="add('*')" class="btn-op">×</button>
                    <button onclick="add('exp(')" class="btn-op">e</button>
                    <!-- 5行目 -->
                    <button onclick="add('1')">1</button>
                    <button onclick="add('2')">2</button>
                    <button onclick="add('3')">3</button>
                    <button onclick="add('-')" class="btn-op">-</button>
                    <button onclick="solve()" class="btn-eq">=</button>
                    <!-- 6行目 -->
                    <button onclick="add('0')" style="grid-column: span 2;">0</button>
                    <button onclick="add('.')">.</button>
                    <button onclick="add('+')" class="btn-op">+</button>
                </div>
            </div>
            <div class="card" style="margin-top:20px;">
                <p style="font-size:0.8rem; opacity:0.7;">※「10 + sin(pi/2)」のような数式をそのまま入力・計算できます。 math.js エンジン搭載。</p>
                <button class="action-btn" style="background:#475569;" onclick="alert('PDF/画像編集ツールへ')">その他のツール (PDF/画像)</button>
            </div>
        </div>

        <!-- 2. 他のタブ (簡略化して維持) -->
        <div id="media" class="tab-content">
            <div class="card">
                <h2>🎬 メディアエンジン</h2>
                <input type="file" accept="video/*,audio/*">
                <button class="action-btn" style="margin-top:10px;">書き出し・変換</button>
            </div>
        </div>

        <div id="ai" class="tab-content">
            <div class="card">
                <h2>🧠 AI翻訳・敬語</h2>
                <textarea placeholder="文章を入力..." style="height:100px;"></textarea>
                <button class="action-btn" style="margin-top:10px;">AI変換実行</button>
            </div>
        </div>

        <div id="games" class="tab-content">
            <div class="card">
                <h2>🎮 100種ゲーム</h2>
                <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap:5px;">
                    <div style="aspect-ratio:1; background:#334155; border-radius:8px;"></div>
                    <div style="aspect-ratio:1; background:#334155; border-radius:8px;"></div>
                    <div style="aspect-ratio:1; background:#334155; border-radius:8px;"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // タブ制御
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        // --- 電卓ロジック ---
        let expr = "";
        const exprDiv = document.getElementById('calc-expr');
        const resDiv = document.getElementById('calc-res');

        function add(val) {
            expr += val;
            exprDiv.innerText = expr;
        }

        function clearCalc() {
            expr = "";
            exprDiv.innerText = "";
            resDiv.innerText = "0";
        }

        function backspace() {
            expr = expr.slice(0, -1);
            exprDiv.innerText = expr;
        }

        function solve() {
            try {
                // math.js で計算
                let result = math.evaluate(expr);
                // 小数点以下が長い場合は丸める
                if (typeof result === 'number') {
                    result = Math.round(result * 100000000) / 100000000;
                }
                resDiv.innerText = result;
            } catch (e) {
                resDiv.innerText = "Error";
            }
        }
    </script>
</body>
</html>
