<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniHub - v4.0 System Integration</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root {
            --primary: #6366f1; --bg: #0f172a; --card-bg: #1e293b;
            --text: #f8fafc; --accent: #22d3ee; --success: #10b981;
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px 20px 120px; }
        header { text-align: center; margin-bottom: 20px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid #334155; }
        h2 { font-size: 1.1rem; border-left: 4px solid var(--primary); padding-left: 10px; margin: 0 0 15px; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
        
        /* チャットエリア */
        #chat-display { height: 150px; overflow-y: auto; background: #000; padding: 10px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 10px; }
        .msg { margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 2px; }
        .msg.ai { color: var(--accent); }

        /* ゲームサンプルエリア */
        #game-canvas { width: 100%; height: 150px; background: #334155; border-radius: 8px; position: relative; overflow: hidden; }
        #player { width: 20px; height: 20px; background: var(--success); position: absolute; border-radius: 50%; }
        #speaker { width: 20px; height: 20px; background: var(--danger); position: absolute; left: 80%; top: 50%; border-radius: 4px; }

        #ai-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 800px; background: var(--card-bg); padding: 15px; border-radius: 50px; border: 2px solid var(--primary); display: flex; gap: 10px; z-index: 1000; }
        #ai-bar input { border: none; background: transparent; margin: 0; }
    </style>
</head>
<body>

    <header><h1>OmniHub <span>v4.0 Connect</span></h1></header>

    <main class="dashboard">
        
        <!-- 低速対応チャット -->
        <section class="card">
            <h2>💬 超高速チャット (低速WiFi対応)</h2>
            <div id="chat-display"></div>
            <input type="text" id="chat-input" placeholder="メッセージを入力...">
            <div style="display: flex; gap: 5px;">
                <button onclick="sendChat()" style="background: var(--success);">送信</button>
                <button onclick="aiSummarizeChat()" style="background: var(--accent); color: #000;">AI要約</button>
            </div>
            <p style="font-size: 0.7rem; color: #94a3b8; margin-top: 5px;">※低速時はテキストのみを優先送信します</p>
        </section>

        <!-- VC連携ゲーム物理 -->
        <section class="card">
            <h2>🎮 ゲーム & 近接VCシミュレーター</h2>
            <p style="font-size: 0.8rem;">緑を操作して赤に近づくと音が大きくなります</p>
            <div id="game-canvas" onclick="movePlayer(event)">
                <div id="player"></div>
                <div id="speaker"></div>
            </div>
            <div id="vc-status" style="margin-top: 10px; font-size: 0.9rem; text-align: center;">音量: 0% / 反響: OFF</div>
            <button onclick="alert('ZIP/HTML解析AIを起動します')">自作ゲームを追加</button>
        </section>

        <!-- 既存：数学・画像編集など（タブ切り替えなどで整理可能） -->
        <section class="card">
            <h2>⚙️ システム設定</h2>
            <button onclick="changeTheme()">テーマ変更</button>
            <button onclick="alert('ボイスチェンジャー設定を開きます')">ボイスチェンジ設定</button>
            <button onclick="location.reload()">システム再起動</button>
        </section>

    </main>

    <div id="ai-bar">
        <input type="text" id="ai-cmd" placeholder="AIへの指示（敬語・要約・翻訳・プログラム作成）">
        <button onclick="runAI()" style="width: 80px; margin: 0;">実行</button>
    </div>

    <script>
        // --- 1. チャット機能 ---
        const chatDisplay = document.getElementById('chat-display');
        function sendChat() {
            const input = document.getElementById('chat-input');
            if (!input.value) return;
            
            // 通信量を抑えるためのJSON最適化を想定
            const msg = document.createElement('div');
            msg.className = 'msg';
            msg.innerText = "自分: " + input.value;
            chatDisplay.appendChild(msg);
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
            input.value = "";
        }

        function aiSummarizeChat() {
            const summary = document.createElement('div');
            summary.className = 'msg ai';
            summary.innerText = "AI要約: 現在の会話の流れは「新機能の確認」についてです。";
            chatDisplay.appendChild(summary);
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
        }

        // --- 2. ゲーム & 近接VCロジック ---
        const player = document.getElementById('player');
        const speaker = document.getElementById('speaker');
        const vcStatus = document.getElementById('vc-status');

        function movePlayer(e) {
            const rect = document.getElementById('game-canvas').getBoundingClientRect();
            const x = e.clientX - rect.left - 10;
            const y = e.clientY - rect.top - 10;
            player.style.left = x + 'px';
            player.style.top = y + 'px';

            // 距離計算 (三平方の定理)
            const sx = rect.width * 0.8;
            const sy = rect.height * 0.5;
            const dist = Math.sqrt(Math.pow(x - sx, 2) + Math.pow(y - sy, 2));
            
            // 音量シミュレーション (150px以内で聞こえる)
            let vol = Math.max(0, Math.floor(100 - (dist / 1.5)));
            let reverb = dist > 100 ? "ON" : "OFF";
            vcStatus.innerText = `音量: ${vol}% / 反響: ${reverb}`;
        }

        // --- 3. AIコマンド実行 ---
        function runAI() {
            const cmd = document.getElementById('ai-cmd').value;
            if (cmd.startsWith("敬語")) {
                alert("敬語に変換しました。");
            } else {
                alert("リクエストを受理しました。バックエンドで処理を開始します。");
            }
            document.getElementById('ai-cmd').value = "";
        }

        function changeTheme() {
            document.body.style.filter = document.body.style.filter === 'hue-rotate(90deg)' ? '' : 'hue-rotate(90deg)';
        }
    </script>
</body>
</html>
