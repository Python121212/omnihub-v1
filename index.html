<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniHub - 万能AI便利サイト</title>
    <!-- ライブラリ読み込み -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --accent: #22d3ee;
            --danger: #ef4444;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0;
            padding: 20px;
            padding-bottom: 120px;
        }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 2.5rem; margin: 0; }
        header span { font-size: 0.4em; color: var(--accent); border: 1px solid var(--accent); padding: 2px 8px; border-radius: 20px; vertical-align: middle; }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #334155;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); }

        h2 { font-size: 1.2rem; border-left: 4px solid var(--primary); padding-left: 10px; margin-top: 0; margin-bottom: 15px; }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 5px;
        }
        button:hover { opacity: 0.8; }

        /* ゲームリスト用 */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            max-height: 150px;
            overflow-y: auto;
            background: #0f172a;
            padding: 10px;
            border-radius: 8px;
        }
        .game-item { font-size: 0.8rem; padding: 5px; background: #334155; border-radius: 4px; text-align: center; }

        /* メディアプレイヤー */
        video, audio { width: 100%; margin-top: 10px; border-radius: 8px; }

        /* AIバー */
        #ai-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 800px;
            background: var(--card-bg); padding: 15px; border-radius: 50px;
            border: 2px solid var(--primary); box-shadow: 0 -5px 30px rgba(0,0,0,0.6);
            display: flex; align-items: center; z-index: 1000;
        }
        #ai-bar input { border: none; background: transparent; margin-bottom: 0; flex-grow: 1; }
    </style>
</head>
<body>

    <header>
        <h1>OmniHub <span>v2.0</span></h1>
        <p>AI統合・多機能プラットフォーム</p>
    </header>

    <main class="dashboard">
        
        <!-- 通信・チャット -->
        <section class="card">
            <h2>💬 通信・チャット</h2>
            <button onclick="alert('VC起動（SkyWay連携準備中）')">高音質VC開始</button>
            <textarea id="chat-box" readonly placeholder="チャット内容がここに表示されます..." style="height: 80px;"></textarea>
            <input type="text" placeholder="メッセージを入力（WiFi低速モード自動適用）">
        </section>

        <!-- 数学・電卓 -->
        <section class="card">
            <h2>🔢 関数電卓・方程式</h2>
            <input type="text" id="math-input" placeholder="例: solve(2x + 5 = 13) や sin(45 deg)">
            <button onclick="calculateMath()" style="background: #10b981;">計算実行</button>
            <div id="math-result" style="color: var(--accent); font-weight: bold; min-height: 20px;"></div>
        </section>

        <!-- メディア -->
        <section class="card">
            <h2>🎬 動画・音楽・変換</h2>
            <input type="file" id="media-upload" accept="video/*,audio/*" onchange="loadMedia(event)">
            <div id="media-viewer">
                <p style="font-size: 0.8rem; color: #94a3b8;">ここにプレビューが表示されます</p>
            </div>
            <button onclick="alert('拡張子変換を開始します')" style="background: #f59e0b; margin-top: 5px;">拡張子変換 (.mp4/.mp3 etc)</button>
        </section>

        <!-- 勉強AI & PDF -->
        <section class="card">
            <h2>📚 勉強AI & PDF編集</h2>
            <input type="file" accept=".pdf,image/*">
            <button onclick="alert('AIが内容を要約して教えます')">AIに読み込ませる</button>
            <div style="display:flex; gap:5px;">
                <button style="background:#475569;">PDF結合</button>
                <button style="background:#475569;">PDF分割</button>
            </div>
        </section>

        <!-- ゲームリスト -->
        <section class="card">
            <h2>🎮 ゲームポータル (100+)</h2>
            <div class="game-grid" id="game-list">
                <!-- JavaScriptで生成 -->
            </div>
            <button style="margin-top:10px; background: var(--danger);">ゲームを自作・追加 (ZIP/HTML)</button>
        </section>

        <!-- 便利ツール詰め合わせ -->
        <section class="card">
            <h2>🛠️ 便利ツール</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <button onclick="generateQR()">QR作成</button>
                <button onclick="updateClock()">世界時計</button>
                <button onclick="searchMap()">マップ</button>
                <button onclick="alert('画像編集開始')">画像加工</button>
            </div>
            <div id="qr-output" style="margin-top:10px; background:white; display:none; justify-content:center; padding:10px; border-radius:8px;"></div>
            <p id="clock-display" style="text-align:center; margin:5px 0; font-family:monospace;"></p>
        </section>

    </main>

    <!-- AI入力バー -->
    <div id="ai-bar">
        <input type="text" id="ai-input" placeholder="AIに命令（要約・敬語・翻訳・文字おこし）...">
    </div>

    <script>
        // --- ゲームリスト生成 (ダミー) ---
        const gameList = document.getElementById('game-list');
        for(let i=1; i<=100; i++) {
            const item = document.createElement('div');
            item.className = 'game-item';
            item.innerText = 'Game ' + i;
            gameList.appendChild(item);
        }

        // --- 数学計算 ---
        function calculateMath() {
            const input = document.getElementById('math-input').value;
            const res = document.getElementById('math-result');
            try {
                const result = math.evaluate(input);
                res.innerText = "結果: " + result;
            } catch (e) {
                res.innerText = "エラー: 正しい数式を入力してください";
            }
        }

        // --- QRコード生成 ---
        function generateQR() {
            const url = prompt("QRコードにするURLを入力してください");
            const output = document.getElementById('qr-output');
            output.innerHTML = "";
            if(url) {
                output.style.display = "flex";
                new QRCode(output, { text: url, width: 120, height: 120 });
            }
        }

        // --- 世界時計 ---
        function updateClock() {
            const now = new Date();
            document.getElementById('clock-display').innerText = "日本: " + now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);

        // --- メディア読み込み ---
        function loadMedia(event) {
            const file = event.target.files[0];
            const viewer = document.getElementById('media-viewer');
            const url = URL.createObjectURL(file);
            if(file.type.startsWith('video')) {
                viewer.innerHTML = `<video src="${url}" controls></video>`;
            } else {
                viewer.innerHTML = `<audio src="${url}" controls></audio>`;
            }
        }

        // --- マップ検索 ---
        function searchMap() {
            const loc = prompt("どこを検索しますか？");
            if(loc) window.open(`https://www.google.com/maps?q=${encodeURIComponent(loc)}`);
        }

        // --- AI入力バーロジック ---
        document.getElementById('ai-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const cmd = this.value;
                if (cmd.includes("敬語")) {
                    alert("【AI敬語変換】: 「" + cmd.replace("敬語", "") + "」の丁寧な表現を生成しました。");
                } else {
                    alert("AIがリクエスト「" + cmd + "」を受信しました。バックエンドAPIと連携準備中です。");
                }
                this.value = '';
            }
        });
    </script>
</body>
</html>
