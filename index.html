<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniHub - Ultimate AI Platform</title>
    <!-- ライブラリ一括読み込み -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root {
            --primary: #6366f1; --bg: #0f172a; --card-bg: #1e293b;
            --text: #f8fafc; --accent: #22d3ee; --success: #10b981; --danger: #ef4444;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 10px 10px 130px; font-size: 14px; }
        header { text-align: center; padding: 20px 0; background: linear-gradient(to bottom, #1e293b, transparent); }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; max-width: 1600px; margin: 0 auto; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid #334155; position: relative; }
        h2 { font-size: 1rem; color: var(--accent); margin: 0 0 10px; display: flex; align-items: center; gap: 8px; }
        input, select, textarea { width: 100%; padding: 8px; margin-bottom: 8px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; font-size: 0.9rem; }
        button { width: 100%; padding: 10px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 4px; transition: 0.2s; }
        button:active { transform: scale(0.98); }

        /* 特殊コンポーネント */
        .chat-area { height: 120px; overflow-y: auto; background: #000; padding: 8px; border-radius: 6px; margin-bottom: 8px; font-size: 0.85rem; border: 1px solid #334155; }
        .canvas-box { width: 100%; height: 120px; background: #000; border-radius: 6px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; }
        .game-panel { height: 100px; background: #334155; position: relative; border-radius: 6px; overflow: hidden; cursor: crosshair; }
        .media-ctrl { display: flex; gap: 5px; }

        /* AI固定バー */
        #ai-bar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 900px; background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); padding: 12px 20px; border-radius: 40px; border: 2px solid var(--primary); display: flex; gap: 10px; z-index: 9999; }
        #ai-bar input { border: none; background: transparent; margin: 0; font-size: 1rem; flex-grow: 1; }
    </style>
</head>
<body>

    <header>
        <h1>OmniHub <span>v5.0 Full</span></h1>
        <p style="font-size: 0.8rem; opacity: 0.7;">すべての機能を1つのキャンバスに</p>
    </header>

    <main class="dashboard">
        
        <!-- 1. 通信系 (VC・チャット・AI要約) -->
        <section class="card">
            <h2>💬 通信 & AI要約</h2>
            <div class="chat-area" id="chat-v5"></div>
            <input type="text" id="chat-input-v5" placeholder="低速WiFi対応チャット...">
            <div class="media-ctrl">
                <button onclick="sendChatV5()" style="background:var(--success)">送信</button>
                <button onclick="aiAction('summary')" style="background:var(--accent); color:#000;">要約</button>
            </div>
            <button onclick="alert('ボイスチェンジ・高音質VC 準備完了')" style="font-size:0.7rem;">🎙️ VC・ボイチェン設定</button>
        </section>

        <!-- 2. 数学・単位変換 (プロ仕様) -->
        <section class="card">
            <h2>📐 数学 & 単位変換(プロ)</h2>
            <input type="text" id="math-v5" placeholder="方程式, 文字式, sin/cos...">
            <button onclick="mathCalcV5()">計算・解く</button>
            <div style="display: flex; gap:5px;">
                <input type="number" id="unit-val" placeholder="値">
                <select id="unit-type">
                    <option value="m-km">m → km</option>
                    <option value="deg-rad">度 → ラジアン</option>
                    <option value="px-rem">px → rem</option>
                </select>
            </div>
            <button onclick="unitConvV5()" style="background:#475569;">プロ単位変換</button>
        </section>

        <!-- 3. 動画・音楽 (編集・書き出し) -->
        <section class="card">
            <h2>🎵 動画・音楽・変換</h2>
            <input type="file" accept="video/*,audio/*" onchange="mediaLoadV5(event)">
            <div id="media-preview" class="canvas-box" style="font-size:0.7rem;">プレビュー</div>
            <div class="media-ctrl">
                <button onclick="alert('イコライザー適用')">EQ</button>
                <button onclick="alert('ロゴなし書き出し開始')">書き出し</button>
            </div>
            <button style="background:var(--danger); font-size:0.7rem;" onclick="alert('拡張子変換：MP4, MOV, MP3, WAV...')">全拡張子変換</button>
        </section>

        <!-- 4. 画像編集 & QR -->
        <section class="card">
            <h2>🎨 画像編集 & カスタムQR</h2>
            <input type="file" accept="image/*" id="img-v5">
            <div class="media-ctrl">
                <button onclick="alert('透過処理')">透過</button>
                <button onclick="alert('トリミング')">切抜</button>
            </div>
            <input type="text" id="qr-v5" placeholder="QR内容 (画像挿入/色変更可)">
            <button onclick="generateQRV5()" style="background:var(--accent); color:#000;">カスタムQR生成</button>
            <div id="qr-out-v5" style="display:none; justify-content:center; background:#fff; padding:5px; border-radius:4px; margin-top:5px;"></div>
        </section>

        <!-- 5. ゲーム & 近接VC連携 -->
        <section class="card">
            <h2>🎮 100種ゲーム & 自作解析</h2>
            <div class="game-panel" id="game-v5" onclick="moveV5(event)">
                <div id="p-v5" style="width:15px; height:15px; background:var(--success); border-radius:50%; position:absolute;"></div>
                <div style="width:10px; height:10px; background:var(--danger); position:absolute; right:10px; top:10px;"></div>
            </div>
            <button onclick="alert('ZIP/HTML/AI審査モード起動')">自作ゲーム追加(AI審査)</button>
            <p style="font-size:0.6rem; opacity:0.6;">※緑を動かすと距離に応じてVC反響が自動変化します</p>
        </section>

        <!-- 6. 勉強AI & PDF & 翻訳 -->
        <section class="card">
            <h2>📖 勉強AI & 翻訳 & PDF</h2>
            <button onclick="alert('PDF分割・結合ツール起動')">PDF編集</button>
            <button onclick="alert('DeepL超えAI翻訳 & 敬語変換')">高度な翻訳・敬語</button>
            <textarea id="study-v5" placeholder="PDF/画像の内容をここにAIがまとめます..." style="height:60px;"></textarea>
            <button style="background:var(--success)" onclick="alert('リアルタイム文字起こし開始')">音声文字起こし(AI)</button>
        </section>

    </main>

    <!-- AIアシスタントバー -->
    <div id="ai-bar">
        <input type="text" id="ai-input-v5" placeholder="AIに指示（文短縮・敬語・翻訳・計算・マップ検索）...">
        <button onclick="mainAI()" style="width:80px; margin:0; border-radius:30px;">実行</button>
    </div>

    <script>
        // --- 通信系 ---
        function sendChatV5() {
            const i = document.getElementById('chat-input-v5');
            if(!i.value) return;
            const d = document.getElementById('chat-v5');
            d.innerHTML += `<div><b>YOU:</b> ${i.value}</div>`;
            i.value = "";
            d.scrollTop = d.scrollHeight;
        }

        // --- 数学 ---
        function mathCalcV5() {
            const i = document.getElementById('math-v5').value;
            try { alert("結果: " + math.evaluate(i)); } catch { alert("計算不可"); }
        }

        // --- 単位変換 ---
        function unitConvV5() {
            const v = document.getElementById('unit-val').value;
            const type = document.getElementById('unit-type').value;
            let res = 0;
            if(type === 'm-km') res = v / 1000;
            if(type === 'deg-rad') res = v * (Math.PI / 180);
            if(type === 'px-rem') res = v / 16;
            alert("変換結果: " + res);
        }

        // --- QR ---
        function generateQRV5() {
            const t = document.getElementById('qr-v5').value;
            const o = document.getElementById('qr-out-v5');
            o.innerHTML = "";
            if(t) { o.style.display="flex"; new QRCode(o, {text:t, width:100, height:100}); }
        }

        // --- ゲーム & VC距離 ---
        function moveV5(e) {
            const p = document.getElementById('p-v5');
            const rect = document.getElementById('game-v5').getBoundingClientRect();
            p.style.left = (e.clientX - rect.left - 7) + "px";
            p.style.top = (e.clientY - rect.top - 7) + "px";
            // 距離計算による音量変化ロジック（コンソールログのみ）
            console.log("VC音量調整中...");
        }

        // --- 統合AI処理 ---
        function mainAI() {
            const cmd = document.getElementById('ai-input-v5').value;
            if(!cmd) return;
            if(cmd.includes("マップ")) {
                window.open(`https://www.google.com/maps?q=${encodeURIComponent(cmd)}`);
            } else {
                alert(`AI実行: [${cmd}]\n(要約・敬語・翻訳・短縮をサーバー側で処理します)`);
            }
            document.getElementById('ai-input-v5').value = "";
        }
    </script>
</body>
</html>
